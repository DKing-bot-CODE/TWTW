<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股熱力圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--bg2:#0f1218;--bg3:#151b25;--border:#1e2836;--text:#c8d4e0;--text-dim:#5a6a7e;--text-bright:#e8f0f8;--accent:#1a6cf0;--red:#e8162a;--green:#00b050;--gold:#f0a500;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:13px;display:flex;flex-direction:column;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:48px;flex-shrink:0;}
.logo{font-size:16px;font-weight:900;color:var(--text-bright);text-decoration:none;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:4px;}
.nav-link{font-size:11px;text-decoration:none;padding:3px 10px;border-radius:4px;border:1px solid var(--border);color:var(--text-dim);transition:.15s;}
.nav-link:hover{color:#6ab4ff;border-color:rgba(26,108,240,.4);}
.nav-link.active{background:rgba(240,165,0,.12);border-color:rgba(240,165,0,.35);color:var(--gold);}
.toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;}
.fbtn{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;background:var(--accent);color:#fff;border:none;padding:6px 16px;border-radius:5px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:.15s;white-space:nowrap;}
.fbtn:hover:not(:disabled){background:#2a7cf8;}
.fbtn:disabled{background:rgba(26,108,240,.3);color:rgba(255,255,255,.4);cursor:default;}
@keyframes spin{to{transform:rotate(360deg)}}
.fbtn.loading .bi{animation:spin .7s linear infinite;display:inline-block;}
.seg{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:2px;}
.sbt{padding:4px 10px;border-radius:3px;font-size:11px;cursor:pointer;border:none;background:transparent;color:var(--text-dim);transition:.12s;font-family:'Noto Sans TC',sans-serif;white-space:nowrap;}
.sbt:hover{color:var(--text-bright);}
.sbt.on{background:var(--bg2);color:var(--text-bright);border:1px solid var(--border);}
.badge{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:4px 12px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);white-space:nowrap;}
.status{font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.dot{width:6px;height:6px;background:var(--red);border-radius:50%;display:inline-block;animation:blink 1.2s infinite;margin-right:3px;}
.toast{font-size:11px;padding:4px 10px;border-radius:4px;font-weight:600;opacity:0;transition:opacity .3s;white-space:nowrap;}
.toast.ok{background:rgba(0,176,80,.15);color:#4cd88a;border:1px solid rgba(0,176,80,.3);}
.toast.err{background:rgba(232,22,42,.1);color:#ff8090;border:1px solid rgba(232,22,42,.25);}
.toast.show{opacity:1;}
.lgd{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-dim);}
.lgd-bar{width:90px;height:8px;border-radius:3px;background:linear-gradient(to right,#066040,#158050,#1a3825,#8b3030,#d83030,#c80000);}
#cwrap{flex:1;position:relative;overflow:hidden;}
canvas{display:block;position:absolute;top:0;left:0;}
#overlay{position:absolute;inset:0;pointer-events:none;}
.tt{position:fixed;background:#0f1218;border:1px solid #1e2836;border-radius:6px;padding:10px 13px;font-size:12px;pointer-events:none;z-index:999;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,.6);display:none;}
.ttn{font-size:14px;font-weight:700;color:#e8f0f8;margin-bottom:5px;}
.ttr{display:flex;justify-content:space-between;gap:18px;color:#5a6a7e;margin-bottom:2px;}
.ttv{color:#e8f0f8;font-family:'JetBrains Mono',monospace;}
#ldg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-dim);font-size:13px;background:var(--bg);z-index:10;}
.sp{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
</style>
</head>
<body>
<header>
  <a class="logo" href="index.html">台股<span>資訊</span>站</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">首頁</a>
    <a class="nav-link" href="disposal-attention.html">⚠ 處置股×注意股</a>
    <a class="nav-link active" href="heatmap.html">🔥 熱力圖</a>
  </div>
</header>

<div class="toolbar">
  <button class="fbtn" id="fb" onclick="fetchData()"><span class="bi">↺</span><span id="bt">立即抓取</span></button>
  <div class="seg" id="ms">
    <button class="sbt on" onclick="seg('ms',this,'both')">上市+上櫃</button>
    <button class="sbt"    onclick="seg('ms',this,'twse')">上市</button>
    <button class="sbt"    onclick="seg('ms',this,'tpex')">上櫃</button>
  </div>
  <div class="seg" id="ss">
    <button class="sbt on" onclick="seg('ss',this,'vol')">成交量</button>
    <button class="sbt"    onclick="seg('ss',this,'eq')">等大小</button>
  </div>
  <div class="seg" id="gs">
    <button class="sbt on" onclick="seg('gs',this,'ind')">區分產業</button>
    <button class="sbt"    onclick="seg('gs',this,'all')">不分產業</button>
  </div>
  <div class="lgd"><span>跌停</span><div class="lgd-bar"></div><span>漲停</span></div>
  <div id="ib" class="badge" style="color:var(--text-dim)">加權 —</div>
  <span class="status"><span class="dot"></span><span id="st">尚未載入</span></span>
  <div class="toast" id="toast"></div>
</div>

<div id="cwrap">
  <canvas id="cv"></canvas>
  <div id="ldg"><div class="sp"></div><span id="lt">點擊「立即抓取」開始</span></div>
</div>
<div class="tt" id="tt">
  <div class="ttn" id="tn"></div>
  <div class="ttr"><span>收盤價</span><span class="ttv" id="tc"></span></div>
  <div class="ttr"><span>漲跌幅</span><span class="ttv" id="tp"></span></div>
  <div class="ttr"><span>漲跌</span><span class="ttv" id="tch"></span></div>
  <div class="ttr"><span>成交量(張)</span><span class="ttv" id="tv"></span></div>
  <div class="ttr"><span>產業</span><span class="ttv" id="ti"></span></div>
</div>

<script>
const PROXY='https://corsproxy.io/?url=';
const px=u=>PROXY+encodeURIComponent(u);
const TPXP=['https://api.allorigins.win/raw?url=','https://corsproxy.io/?url=','https://api.codetabs.com/v1/proxy?quest='];
async function ftpex(url){
  for(const p of TPXP){try{const ctrl=new AbortController();setTimeout(()=>ctrl.abort(),10000);const r=await fetch(p+encodeURIComponent(url),{signal:ctrl.signal});if(r.ok)return r.json();}catch(e){}}
  throw new Error('TPEX 連線失敗');
}

let allS=[], opts={mkt:'both',sz:'vol',grp:'ind'}, cells=[];

function seg(id,el,val){
  document.querySelectorAll('#'+id+' .sbt').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const k=id==='ms'?'mkt':id==='ss'?'sz':'grp';
  opts[k]=val;
  if(allS.length) draw();
}

function pctCol(p){
  if(p>= 9.5)return'#c80000';if(p>=7)return'#d42020';if(p>=5)return'#c83030';
  if(p>= 3)return'#b04040';if(p>=1)return'#7a3030';if(p>=0)return'#1a3020';
  if(p>=-1)return'#1a4f30';if(p>=-3)return'#1a6b3a';if(p>=-5)return'#137844';
  if(p>=-7)return'#0d7050';return'#066040';
}

async function fetchData(){
  const btn=document.getElementById('fb');
  btn.disabled=true;btn.classList.add('loading');
  document.getElementById('bt').textContent='抓取中...';
  const ldg=document.getElementById('ldg');ldg.style.display='flex';
  const setL=t=>document.getElementById('lt').textContent=t;

  let twse=[],tpex=[];
  try{
    setL('取得上市資料...');
    const raw=await fetch(px('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL')).then(r=>r.json());
    // 嘗試抓產業分類
    let indMap={};
    try{
      const ii=await fetch(px('https://openapi.twse.com.tw/v1/exchangeReport/BWIBBU_ALL')).then(r=>r.json());
      (Array.isArray(ii)?ii:[]).forEach(r=>{if(r.Code)indMap[r.Code]=r.IndustryName||'';});
    }catch(e){}
    twse=(Array.isArray(raw)?raw:[]).map(r=>{
      const cl=parseFloat(r.ClosingPrice)||0,ch=parseFloat(r.Change)||0;
      const prev=cl-ch,pct=prev>0?ch/prev*100:0;
      return{code:r.Code||'',name:r.Name||'',cl,ch,pct,
        vol:parseInt((r.TradeVolume||'0').replace(/,/g,''))||0,
        market:'TWSE',industry:indMap[r.Code]||'電子'};
    }).filter(r=>r.code&&r.code.length<=4&&r.cl>0);
  }catch(e){showToast(false,'TWSE:'+e.message);}

  try{
    setL('取得上櫃資料...');
    const raw=await ftpex('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_daily_close_quotes');
    tpex=(Array.isArray(raw)?raw:[]).map(r=>{
      const cl=parseFloat(r.Close)||0,ch=parseFloat((r.Change||'0').toString().trim())||0;
      const prev=cl-ch,pct=prev>0?ch/prev*100:0;
      return{code:r.SecuritiesCompanyCode||'',name:r.CompanyName||'',cl,ch,pct,
        vol:parseInt((r.TradingShares||'0').toString().replace(/,/g,''))||0,
        market:'TPEX',industry:'上櫃'};
    }).filter(r=>r.code&&r.code.length<=4&&r.cl>0);
  }catch(e){showToast(false,'TPEX:'+e.message);}

  allS=[...twse,...tpex];
  const now=new Date();
  document.getElementById('st').textContent=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  if(twse.length){
    const top=twse.sort((a,b)=>b.vol-a.vol).slice(0,100);
    const avg=top.reduce((s,r)=>s+r.pct,0)/top.length;
    const ib=document.getElementById('ib');
    ib.style.color=avg>=0?'var(--red)':'var(--green)';
    ib.textContent=`加權 ${avg>=0?'+':''}${avg.toFixed(2)}%`;
  }

  btn.disabled=false;btn.classList.remove('loading');
  document.getElementById('bt').textContent='立即抓取';
  showToast(true,`✓ ${allS.length} 支`);
  draw();
}

// ─── TREEMAP (slice-and-dice with aspect ratio) ───
function treemap(nodes, x, y, w, h){
  if(!nodes.length||w<=0||h<=0) return [];
  const total=nodes.reduce((s,n)=>s+n.v,0);
  if(!total) return nodes.map(()=>({x,y,w:0,h:0}));
  const rects=Array(nodes.length);
  tile(nodes,0,nodes.length,total,x,y,w,h,rects);
  return rects;
}

function tile(nodes, a, b, total, x, y, w, h, rects){
  if(a>=b) return;
  if(b-a===1){rects[a]={x,y,w,h};return;}

  // Find best split point (minimize aspect ratio)
  let bestSplit=a+1, bestScore=Infinity;
  let sumA=nodes[a].v;
  for(let i=a+1;i<b;i++){
    const sumB=total-sumA;
    const rA=sumA/total, rB=sumB/total;
    const score = w>=h
      ? Math.max(rA*h/(rA*w/rA/h||1), rB*h/(rB*w/rB/h||1))
      : Math.max(rA*w/(rA*h/rA/w||1), rB*w/(rB*h/rB/w||1));
    if(score<bestScore){bestScore=score;bestSplit=i;}
    sumA+=nodes[i].v;
  }

  const sA=nodes.slice(a,bestSplit).reduce((s,n)=>s+n.v,0);
  const sB=total-sA;

  if(w>=h){
    const wA=w*sA/total;
    layoutRow(nodes,a,bestSplit,sA,x,y,wA,h,rects);
    tile(nodes,bestSplit,b,sB,x+wA,y,w-wA,h,rects);
  } else {
    const hA=h*sA/total;
    layoutRow(nodes,a,bestSplit,sA,x,y,w,hA,rects);
    tile(nodes,bestSplit,b,sB,x,y+hA,w,h-hA,rects);
  }
}

function layoutRow(nodes,a,b,sum,x,y,w,h,rects){
  if(!sum) return;
  if(w>=h){
    let cx=x;
    for(let i=a;i<b;i++){const cw=w*nodes[i].v/sum;rects[i]={x:cx,y,w:cw,h};cx+=cw;}
  } else {
    let cy=y;
    for(let i=a;i<b;i++){const ch=h*nodes[i].v/sum;rects[i]={x,y:cy,w,h:ch};cy+=ch;}
  }
}

// ─── DRAW ───
function draw(){
  const wrap=document.getElementById('cwrap');
  const cv=document.getElementById('cv');
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  const ctx=cv.getContext('2d');
  ctx.scale(devicePixelRatio,devicePixelRatio);
  ctx.clearRect(0,0,W,H);
  cells=[];
  document.getElementById('ldg').style.display='none';
  if(!allS.length) return;

  const stocks=allS.filter(s=>{
    if(opts.mkt==='twse') return s.market==='TWSE';
    if(opts.mkt==='tpex') return s.market==='TPEX';
    return true;
  }).filter(s=>s.vol>0||opts.sz==='eq');

  const PAD=2;

  if(opts.grp==='all'){
    const nodes=stocks.map((s,i)=>({s,v:opts.sz==='eq'?1:s.vol,i})).sort((a,b)=>b.v-a.v);
    const rects=treemap(nodes,PAD,PAD,W-PAD*2,H-PAD*2);
    nodes.forEach((n,i)=>{
      const r=rects[i]; if(!r||r.w<2||r.h<2) return;
      drawCell(ctx,r.x,r.y,r.w-PAD,r.h-PAD,n.s);
      cells.push({x:r.x,y:r.y,w:r.w-PAD,h:r.h-PAD,s:n.s});
    });
    return;
  }

  // Industry grouping
  const map={};
  stocks.forEach(s=>{
    const k=s.industry||'其他';
    if(!map[k]) map[k]=[];
    map[k].push(s);
  });
  const groups=Object.entries(map)
    .map(([name,arr])=>({name,arr,v:arr.reduce((s,r)=>s+(opts.sz==='eq'?1:r.vol),0)}))
    .filter(g=>g.v>0).sort((a,b)=>b.v-a.v);

  const GP=4, LH=16;
  const gnodes=groups.map((g,i)=>({s:g,v:g.v,i}));
  const grects=treemap(gnodes,GP,GP,W-GP*2,H-GP*2);

  groups.forEach((group,gi)=>{
    const gr=grects[gi]; if(!gr||gr.w<8||gr.h<8) return;
    const gW=gr.w-GP, gH=gr.h-GP, gX=gr.x, gY=gr.y;

    // Group background
    ctx.fillStyle='rgba(255,255,255,0.025)';
    ctx.strokeStyle='rgba(255,255,255,0.07)';
    ctx.lineWidth=1;
    rrect(ctx,gX,gY,gW,gH,3); ctx.fill(); ctx.stroke();

    // Industry label at bottom
    const lblH=gH>35?LH:0;
    if(lblH){
      ctx.fillStyle='rgba(180,200,220,0.45)';
      ctx.font=`500 10px 'Noto Sans TC',sans-serif`;
      ctx.textAlign='left'; ctx.textBaseline='bottom';
      ctx.fillText(group.name+' —', gX+4, gY+gH-2);
    }

    const iX=gX+PAD, iY=gY+PAD;
    const iW=gW-PAD*2, iH=gH-lblH-PAD*2;
    if(iW<4||iH<4) return;

    const snodes=group.arr.map((s,i)=>({s,v:opts.sz==='eq'?1:s.vol,i})).sort((a,b)=>b.v-a.v);
    const srects=treemap(snodes,iX,iY,iW,iH);

    snodes.forEach((n,si)=>{
      const r=srects[si]; if(!r||r.w<2||r.h<2) return;
      const cw=r.w-PAD, ch=r.h-PAD; if(cw<2||ch<2) return;
      drawCell(ctx,r.x,r.y,cw,ch,n.s);
      cells.push({x:r.x,y:r.y,w:cw,h:ch,s:n.s});
    });
  });
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawCell(ctx,x,y,w,h,s){
  ctx.fillStyle=pctCol(s.pct);
  rrect(ctx,x,y,w,h,2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=0.5; ctx.stroke();
  if(w<12||h<12) return;

  ctx.textAlign='center'; ctx.textBaseline='middle';
  const mfs=Math.min(w/s.name.length*1.5,h*0.3,15);
  const nfs=Math.max(8,Math.min(mfs,15));
  const pfs=Math.max(7,nfs*0.78);
  const cx=x+w/2;

  if(h>=34&&nfs>=8){
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.font=`700 ${nfs}px 'Noto Sans TC',sans-serif`;
    ctx.fillText(s.name,cx,y+h/2-pfs*0.65);
    ctx.fillStyle='rgba(255,255,255,0.80)';
    ctx.font=`600 ${pfs}px 'JetBrains Mono',monospace`;
    ctx.fillText((s.pct>=0?'+':'')+s.pct.toFixed(2)+'%',cx,y+h/2+nfs*0.65);
  } else if(h>=16&&nfs>=8){
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.font=`700 ${nfs}px 'Noto Sans TC',sans-serif`;
    ctx.fillText(s.name,cx,y+h/2);
  }
}

// Hover
const cv2=document.getElementById('cv');
cv2.addEventListener('mousemove',e=>{
  const rect=cv2.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const hit=cells.find(c=>mx>=c.x&&mx<c.x+c.w&&my>=c.y&&my<c.y+c.h);
  const tt=document.getElementById('tt');
  if(hit){
    const s=hit.s;
    tt.style.display='block';
    document.getElementById('tn').textContent=s.name+' ('+s.code+')';
    const cs=s.pct>=0?'var(--red)':'var(--green)';
    const sg=s.pct>=0?'+':'';
    document.getElementById('tc').textContent=s.cl.toLocaleString();
    document.getElementById('tp').style.color=cs;
    document.getElementById('tp').textContent=sg+s.pct.toFixed(2)+'%';
    document.getElementById('tch').style.color=cs;
    document.getElementById('tch').textContent=(s.ch>=0?'+':'')+s.ch.toFixed(2);
    document.getElementById('tv').textContent=s.vol.toLocaleString();
    document.getElementById('ti').textContent=s.industry||'—';
    tt.style.left=Math.min(e.clientX+14,window.innerWidth-175)+'px';
    tt.style.top=Math.min(e.clientY-10,window.innerHeight-155)+'px';
    cv2.style.cursor='crosshair';
  } else {
    tt.style.display='none';
    cv2.style.cursor='default';
  }
});
cv2.addEventListener('mouseleave',()=>document.getElementById('tt').style.display='none');

function showToast(ok,msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast '+(ok?'ok':'err');
  void t.offsetWidth; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4000);
}

window.addEventListener('resize',()=>{if(allS.length)draw();});
</script>
</body>
</html>
